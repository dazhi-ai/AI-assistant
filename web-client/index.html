<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>AI 助手</title>
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>

    <!-- 顶部导航栏 -->
    <header class="top-bar">
      <div class="bar-left">
        <span class="app-name">AI 助手</span>
        <span id="statusDot" class="status-dot disconnected"></span>
        <span id="statusText" class="status-label">未连接</span>
      </div>
      <div class="bar-right">
        <button id="settingsBtn" class="btn-icon" type="button" title="设置">&#9881;</button>
      </div>
    </header>

    <!-- 主体滚动区 -->
    <div class="app-body">

      <!-- Live2D 人物嵌入区 -->
      <div id="live2dContainer" class="live2d-embed">
        <div id="modelText" class="model-label">模型加载中...</div>
      </div>

      <!-- 口型能量条 -->
      <div class="mouth-track">
        <div id="mouthBarInner" class="mouth-bar-fill"></div>
      </div>

      <!-- AI 回复气泡 -->
      <div class="reply-bubble">
        <div class="reply-icon">AI</div>
        <div id="aiReplyText" class="reply-text">连接后向 AI 发送消息。</div>
      </div>

      <!-- 天气卡片（有数据时显示） -->
      <div id="weatherSection" class="weather-section hidden">
        <div id="weatherText" class="weather-title"></div>
        <div id="weatherCards" class="weather-cards"></div>
      </div>

    </div>

    <!-- 底部固定输入栏 -->
    <div class="bottom-bar">
      <button id="voiceBtn" class="btn-voice" type="button" title="语音输入">&#127908;</button>
      <input id="textInput" class="chat-input" type="text" placeholder="向 AI 说点什么..." />
      <button id="sendTextBtn" class="send-btn" type="button">发送</button>
    </div>

    <!-- 设置全屏面板 -->
    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-header">
        <span class="settings-title">设置</span>
        <button id="settingsCloseBtn" class="btn-icon" type="button">&#10005;</button>
      </div>
      <div class="settings-body">

        <!-- 连接配置 -->
        <div class="settings-section">
          <div class="settings-section-title">连接配置</div>
          <label class="field">
            <span>WebSocket 地址</span>
            <input id="wsUrlInput" type="text" placeholder="自动检测中..." />
          </label>
          <label class="field" style="margin-top:10px;">
            <span>Token（可选）</span>
            <input id="tokenInput" type="text" value="" />
          </label>
          <div class="settings-actions">
            <button id="connectBtn" type="button">连接</button>
            <button id="disconnectBtn" type="button">断开</button>
          </div>
        </div>

        <!-- 消息日志 -->
        <div class="settings-section">
          <div class="settings-section-title">消息日志</div>
          <pre id="logBox" class="log-box"></pre>
        </div>

      </div>
    </div>

    <!-- 隐藏的功能性元素（JS 依赖，不展示） -->
    <div class="hidden">
      <audio id="audioPlayer" preload="none"></audio>
      <div id="audioText"></div>
      <div id="effectText"></div>
      <div id="audioUploadText"></div>
      <div id="qrText"></div>
      <img id="qrImage" alt="" />
      <input id="audioFileInput" type="file" accept=".wav,.mp3,.opus,audio/*" />
      <button id="sendAudioBtn" type="button"></button>
    </div>

    <div id="heartEffect" class="heart-effect hidden">❤</div>

    <!-- live2d-widget 本地文件，无 CDN 依赖 -->
    <script src="./js/L2Dwidget.min.js"
            onerror="document.getElementById('logBox').textContent+='[ERR] L2Dwidget.min.js 加载失败\n'"></script>
    <script src="./js/app.js?v=20260404p"></script>
  </body>
</html>
